name: Build, Provision, and Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hyperconnect-backend
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_db_username: "postgres"

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Frontend deps and build
        run: |
          npm ci
          npm run build
      
      - name: Install Backend deps
        run: cd backend && npm ci
      
      - name: Run Backend linting
        run: cd backend && npm run lint || true

  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6"
      
      - name: Terraform Init
        run: cd terraform && terraform init
      
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: cd terraform && terraform plan -no-color
      
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cd terraform && terraform apply -auto-approve

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build Frontend
        run: |
          npm ci
          npm run build
          
      - name: Deploy to S3
        run: |
          # Expected bucket name based on terraform variables. 
          # Modify if project_name or environment defaults are changed in variables.tf
          aws s3 sync dist/ s3://hyperconnect-frontend-production --delete

  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Create ECR repo if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || aws ecr create-repository --repository-name $ECR_REPOSITORY
          
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
      - name: Get Deployment Details
        id: details
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=hyperconnect-backend" --query "Reservations[].Instances[?State.Name=='running'].InstanceId" --output text)
          RDS_ENDPOINT=$(aws rds describe-db-instances --db-instance-identifier hyperconnect-db --query "DBInstances[0].Endpoint.Address" --output text)
          
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "RDS_ENDPOINT=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          
      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          INSTANCE_ID: ${{ steps.details.outputs.INSTANCE_ID }}
          RDS_ENDPOINT: ${{ steps.details.outputs.RDS_ENDPOINT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          S3_BUCKET_NAME: "hyperconnect-uploads-vtpk0ltu"
        run: |
          DATABASE_URL="postgresql://postgres:${DB_PASSWORD}@${RDS_ENDPOINT}:5432/hyperconnect?schema=public"
          
          # Construct the command to run on EC2
          # We use heredoc to handle multi-line commands cleanly
          SSM_COMMAND=$(cat <<EOF
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
          docker stop hyperconnect-backend || true
          docker rm hyperconnect-backend || true
          docker run -d --name hyperconnect-backend \\
            -p 3001:3001 \\
            -e DATABASE_URL="${DATABASE_URL}" \\
            -e JWT_SECRET="${JWT_SECRET}" \\
            -e AWS_REGION="${AWS_REGION}" \\
            -e S3_BUCKET_NAME="${S3_BUCKET_NAME}" \\
            -e NODE_ENV="production" \\
            ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
          EOF
          )
          
          # Send the command via SSM
          COMMAND_ID=$(aws ssm send-command \\
            --instance-ids "${INSTANCE_ID}" \\
            --document-name "AWS-RunShellScript" \\
            --parameters "commands=[${SSM_COMMAND}]" \\
            --query "Command.CommandId" \\
            --output text)
          
          echo "SSM Command sent! ID: ${COMMAND_ID}"
          
          # Wait for command completion
          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}"
          
          # Check command status
          STATUS=$(aws ssm list-command-invocations --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}" --query "CommandInvocations[0].Status" --output text)
          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed with status: $STATUS"
            aws ssm list-command-invocations --command-id "${COMMAND_ID}" --instance-id "${INSTANCE_ID}" --details --query "CommandInvocations[0].CommandPlugins[0].Output" --output text
            exit 1
          fi
          
          echo "Backend deployment successful!"
